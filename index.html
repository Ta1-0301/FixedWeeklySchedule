<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Weekly Planner - 週間スケジュール管理</title>
  <meta name="description" content="Googleアカウントでログインして、1週間の固定スケジュールを時間割形式で管理。学校の時間割やアルバイトのシフト管理に最適。">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="icon" href="assets/logo.png" type="image/png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/schedule.css">
  <link rel="stylesheet" href="css/mobile.css">

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
</head>
<body>

  <!-- ========== Loading Screen ========== -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">読み込み中...</p>
    </div>
  </div>

  <!-- ========== Login Screen ========== -->
  <div id="login-screen" class="hidden">
    <div class="login-bg-pattern"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <img src="assets/logo.png" alt="Weekly Planner" width="80" height="80">
        </div>
        <h1 class="login-title">Weekly Planner</h1>
        <p class="login-subtitle">週間スケジュール管理</p>
        <p class="login-description">
          Googleアカウントでログインして、あなたの1週間のスケジュールを<br>
          時間割形式で簡単に管理しましょう。
        </p>
        <ul class="login-features">
          <li>
            <span class="feature-icon">📅</span>
            <span>固定スケジュールの管理</span>
          </li>
          <li>
            <span class="feature-icon">🔄</span>
            <span>特定週のみの予定変更</span>
          </li>
          <li>
            <span class="feature-icon">📱</span>
            <span>PC・スマホ対応</span>
          </li>
        </ul>
        <button id="google-login-btn" type="button">
          <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Googleでログイン</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ========== Main App Screen ========== -->
  <div id="app-screen" class="hidden">
    
    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <img src="assets/logo.png" alt="Weekly Planner" class="header-logo" width="32" height="32">
        <span class="header-title">Weekly Planner</span>
      </div>
      <div class="header-right">
        <div class="user-info">
          <img id="user-photo" class="user-avatar" alt="User" width="32" height="32">
          <span id="user-name" class="user-name"></span>
        </div>
        <button id="logout-btn" class="btn-logout" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="logout-text">ログアウト</span>
        </button>
      </div>
    </header>

    <!-- Week Navigation -->
    <nav id="week-nav">
      <button id="prev-week-btn" class="nav-btn" type="button" title="前週">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span class="nav-btn-text">前週</span>
      </button>
      <div class="week-label-container">
        <span id="current-week-label" class="week-label"></span>
        <button id="today-btn" class="btn-today" type="button">今週</button>
      </div>
      <button id="next-week-btn" class="nav-btn" type="button" title="次週">
        <span class="nav-btn-text">次週</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </nav>

    <!-- Mobile Day Tabs -->
    <div id="day-tabs">
      <button class="day-tab active" data-day="0">月</button>
      <button class="day-tab" data-day="1">火</button>
      <button class="day-tab" data-day="2">水</button>
      <button class="day-tab" data-day="3">木</button>
      <button class="day-tab" data-day="4">金</button>
      <button class="day-tab" data-day="5">土</button>
      <button class="day-tab" data-day="6">日</button>
    </div>

    <!-- PC Schedule Grid -->
    <div id="schedule-container">
      <div class="schedule-grid">
        <!-- Header Row -->
        <div class="grid-header">
          <div class="time-header-cell"></div>
          <div class="day-header-cell" data-day="0">
            <span class="day-name">月</span>
            <span class="day-date"></span>
          </div>
          <div class="day-header-cell" data-day="1">
            <span class="day-name">火</span>
            <span class="day-date"></span>
          </div>
          <div class="day-header-cell" data-day="2">
            <span class="day-name">水</span>
            <span class="day-date"></span>
          </div>
          <div class="day-header-cell" data-day="3">
            <span class="day-name">木</span>
            <span class="day-date"></span>
          </div>
          <div class="day-header-cell" data-day="4">
            <span class="day-name">金</span>
            <span class="day-date"></span>
          </div>
          <div class="day-header-cell" data-day="5">
            <span class="day-name">土</span>
            <span class="day-date"></span>
          </div>
          <div class="day-header-cell" data-day="6">
            <span class="day-name">日</span>
            <span class="day-date"></span>
          </div>
        </div>
        <!-- Grid Body -->
        <div class="grid-body" id="grid-body">
          <div class="time-column" id="time-column">
            <!-- Time labels generated by JS -->
          </div>
          <div class="days-container" id="days-container">
            <div class="day-column" data-day="0"></div>
            <div class="day-column" data-day="1"></div>
            <div class="day-column" data-day="2"></div>
            <div class="day-column" data-day="3"></div>
            <div class="day-column" data-day="4"></div>
            <div class="day-column" data-day="5"></div>
            <div class="day-column" data-day="6"></div>
          </div>
          <!-- Current time indicator -->
          <div id="current-time-line" class="current-time-line hidden"></div>
        </div>
      </div>
    </div>

    <!-- Mobile Day View -->
    <div id="mobile-day-view">
      <div id="mobile-day-title" class="mobile-day-title"></div>
      <div id="mobile-schedule-list" class="mobile-schedule-list">
        <!-- Mobile schedule items generated by JS -->
      </div>
      <div id="mobile-empty" class="mobile-empty hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>この日の予定はありません</p>
      </div>
    </div>

    <!-- FAB (Add Schedule) -->
    <button id="add-schedule-fab" type="button" title="予定を追加">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- ========== Schedule Add/Edit Modal ========== -->
  <div id="schedule-modal" class="modal-overlay hidden">
    <div class="modal-content" role="dialog" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">予定を追加</h2>
        <button id="modal-close-btn" class="modal-close" type="button" aria-label="閉じる">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="schedule-form" novalidate>
        <div class="form-group">
          <label for="input-title">タイトル <span class="required">*</span></label>
          <input type="text" id="input-title" placeholder="例：情報工学基礎" required maxlength="50" autocomplete="off">
          <span class="form-error" id="error-title"></span>
        </div>

        <div class="form-group">
          <label for="input-category">カテゴリ <span class="required">*</span></label>
          <select id="input-category" required>
            <option value="">選択してください</option>
            <option value="授業">📘 授業</option>
            <option value="アルバイト">💼 アルバイト</option>
            <option value="研究">🔬 研究</option>
            <option value="サークル">⚽ サークル</option>
            <option value="プライベート">🏠 プライベート</option>
            <option value="その他">📌 その他</option>
          </select>
          <span class="form-error" id="error-category"></span>
        </div>

        <div class="form-group">
          <label for="input-day">曜日 <span class="required">*</span></label>
          <select id="input-day" required>
            <option value="">選択してください</option>
            <option value="0">月曜日</option>
            <option value="1">火曜日</option>
            <option value="2">水曜日</option>
            <option value="3">木曜日</option>
            <option value="4">金曜日</option>
            <option value="5">土曜日</option>
            <option value="6">日曜日</option>
          </select>
          <span class="form-error" id="error-day"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="input-start-time">開始時刻 <span class="required">*</span></label>
            <select id="input-start-time" required>
              <!-- Generated by JS -->
            </select>
            <span class="form-error" id="error-start-time"></span>
          </div>
          <div class="form-group">
            <label for="input-end-time">終了時刻 <span class="required">*</span></label>
            <select id="input-end-time" required>
              <!-- Generated by JS -->
            </select>
            <span class="form-error" id="error-end-time"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="input-memo">メモ</label>
          <textarea id="input-memo" placeholder="メモを入力（任意）" rows="3" maxlength="200"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="modal-delete-btn" class="btn btn-danger hidden">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            <span>削除</span>
          </button>
          <div class="modal-actions-right">
            <button type="button" id="modal-cancel-btn" class="btn btn-secondary">キャンセル</button>
            <button type="submit" id="modal-save-btn" class="btn btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== Drag Change Modal ========== -->
  <div id="drag-modal" class="modal-overlay hidden">
    <div class="modal-content modal-small" role="dialog" aria-labelledby="drag-modal-title">
      <div class="modal-header">
        <h2 id="drag-modal-title">予定の変更方法</h2>
      </div>
      <div class="drag-modal-body">
        <p class="drag-modal-desc" id="drag-change-desc"></p>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="change-type" value="this-week" checked>
            <span class="radio-custom"></span>
            <span class="radio-text">
              <strong>今週のみ変更</strong>
              <small>固定スケジュールは変更しません</small>
            </span>
          </label>
          <label class="radio-label">
            <input type="radio" name="change-type" value="permanent">
            <span class="radio-custom"></span>
            <span class="radio-text">
              <strong>今後も変更</strong>
              <small>固定スケジュール自体を更新します</small>
            </span>
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <div class="modal-actions-right">
          <button id="drag-cancel-btn" class="btn btn-secondary" type="button">キャンセル</button>
          <button id="drag-save-btn" class="btn btn-primary" type="button">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== Delete Confirm Modal ========== -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-content modal-small" role="dialog" aria-labelledby="delete-modal-title">
      <div class="modal-header">
        <h2 id="delete-modal-title">予定の削除</h2>
      </div>
      <div class="delete-modal-body">
        <div class="delete-warning-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <p id="delete-message">この予定を削除しますか？</p>
        <p class="delete-note">この操作は取り消せません。</p>
      </div>
      <div class="modal-actions">
        <div class="modal-actions-right">
          <button id="delete-cancel-btn" class="btn btn-secondary" type="button">キャンセル</button>
          <button id="delete-confirm-btn" class="btn btn-danger" type="button">削除する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== Toast Notification ========== -->
  <div id="toast-container"></div>

  <!-- ========== Scripts ========== -->
  <script src="firebase-config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/firestore.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/dragdrop.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
